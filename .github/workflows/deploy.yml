name: Deploy to Apps Script

# Pushes the project to Apps Script via clasp on every commit to main.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLASPRC_JSON  — contents of your local ~/.clasprc.json (clasp OAuth creds)
#   SCRIPT_ID     — the Apps Script project id (from .clasp.json)
#
# If CI deploys start returning 401, re-run `clasp login` locally and update
# the CLASPRC_JSON secret with the refreshed ~/.clasprc.json.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Write clasp credentials
        run: printf '%s' '${{ secrets.CLASPRC_JSON }}' > "$HOME/.clasprc.json"

      - name: Write .clasp.json
        run: |
          cat > .clasp.json <<EOF
          { "scriptId": "${{ secrets.SCRIPT_ID }}", "rootDir": "src" }
          EOF

      - name: Push to Apps Script
        run: npx clasp push --force
